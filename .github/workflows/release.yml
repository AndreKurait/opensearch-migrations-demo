# Cross-platform release: on a v* tag, build ma-demo for linux + macOS
# (x86_64 + aarch64), tar each, and upload them + install.sh to the GitHub
# release. The toolchain is pinned by rust-toolchain.toml.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build + attach assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            linker: gcc-aarch64-linux-gnu
            cross: true
          # Cross-compiled on Apple Silicon (macos-14): the macOS SDK is
          # universal, so x86_64 needs no extra linker — and this avoids the
          # chronically-backlogged macos-13 (Intel) runner queue.
          - target: x86_64-apple-darwin
            os: macos-14
            cross: true
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "stripped=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-linker (linux aarch64)
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        shell: bash
        env:
          DEMO_VERSION: ${{ steps.ver.outputs.stripped }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify stamped version
        # The build must embed the tag's version (DEMO_VERSION). Catch an empty
        # or mismatched stamp before publishing. Skip cross-built targets (can't
        # exec them on this runner's arch); the native ones run here.
        if: ${{ ! matrix.cross }}
        shell: bash
        run: |
          want="${{ steps.ver.outputs.stripped }}"
          [ -n "$want" ] || { echo "::error::empty version"; exit 1; }
          got="$(target/${{ matrix.target }}/release/ma-demo version)"
          echo "stamped=$got want=$want"
          [ "$got" = "$want" ] || { echo "::error::version mismatch: $got != $want"; exit 1; }

      - name: Package
        id: pkg
        shell: bash
        run: |
          bin="ma-demo-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/ma-demo" "$bin"
          tarball="ma-demo-${{ steps.ver.outputs.stripped }}-${{ matrix.target }}.tar.gz"
          tar -czf "$tarball" "$bin"
          shasum -a 256 "$tarball" > "$tarball.sha256" || sha256sum "$tarball" > "$tarball.sha256"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: |
            ${{ steps.pkg.outputs.tarball }}
            ${{ steps.pkg.outputs.tarball }}.sha256

  installer:
    name: attach install.sh
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload install.sh
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: install.sh

  # Fail loudly if any expected asset is missing — a matrix leg that errored
  # would otherwise publish a release with a hole (a platform with no tarball).
  verify:
    name: verify release assets
    needs: [build, installer]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "stripped=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Assert all assets attached
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          v="${{ steps.ver.outputs.stripped }}"
          tag="${{ steps.ver.outputs.tag }}"
          mapfile -t assets < <(gh release view "$tag" --json assets --jq '.assets[].name')
          printf 'found asset: %s\n' "${assets[@]}"
          want=(
            "install.sh"
            "ma-demo-${v}-x86_64-unknown-linux-gnu.tar.gz"
            "ma-demo-${v}-aarch64-unknown-linux-gnu.tar.gz"
            "ma-demo-${v}-x86_64-apple-darwin.tar.gz"
            "ma-demo-${v}-aarch64-apple-darwin.tar.gz"
          )
          missing=0
          for a in "${want[@]}"; do
            printf '%s\n' "${assets[@]}" | grep -qxF "$a" || { echo "::error::missing asset: $a"; missing=1; }
            # Every tarball must have its .sha256 sidecar.
            case "$a" in
              *.tar.gz)
                printf '%s\n' "${assets[@]}" | grep -qxF "$a.sha256" || { echo "::error::missing checksum: $a.sha256"; missing=1; } ;;
            esac
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "All release assets present."
